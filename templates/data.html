{% extends "base.html" %}
{% block content %}

<style>
    .controls {
        display: flex; gap: 0.75rem; flex-wrap: wrap;
        margin-bottom: 1.25rem; align-items: center;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-icon {
        position: absolute; left: 0.75rem; top: 50%;
        transform: translateY(-50%);
        color: var(--gray500); font-size: 0.85rem; pointer-events: none;
    }
    .search-input {
        width: 100%; padding: 0.55rem 0.75rem 0.55rem 2.25rem;
        border: 1px solid var(--gray300); border-radius: var(--radius);
        font-family: 'Source Sans 3', sans-serif;
        font-size: 0.85rem; color: var(--gray900);
        outline: none; transition: border-color 0.15s; background: white;
    }
    .search-input:focus { border-color: var(--blue2); }

    .filter-select {
        padding: 0.55rem 0.85rem;
        border: 1px solid var(--gray300); border-radius: var(--radius);
        font-family: 'Source Sans 3', sans-serif;
        font-size: 0.82rem; color: var(--gray700);
        background: white; outline: none; cursor: pointer;
        transition: border-color 0.15s; min-width: 140px;
    }
    .filter-select:focus { border-color: var(--blue2); }

    .btn {
        padding: 0.55rem 1rem; border: none; border-radius: var(--radius);
        font-family: 'Source Sans 3', sans-serif;
        font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-outline {
        background: white; border: 1px solid var(--gray300); color: var(--gray700);
    }
    .btn-outline:hover { border-color: var(--blue2); color: var(--blue); }

    .results-info {
        font-size: 0.78rem; color: var(--gray500);
        white-space: nowrap; align-self: center;
    }

    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--gray200); }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; background: white; }
    thead { background: var(--navy); position: sticky; top: 60px; z-index: 10; }
    th {
        color: #94a3b8; font-weight: 600; font-size: 0.7rem;
        letter-spacing: 0.07em; text-transform: uppercase;
        padding: 0.75rem 1rem; text-align: left; white-space: nowrap;
        cursor: pointer; user-select: none; transition: color 0.15s;
    }
    th:hover { color: white; }
    th.sorted-asc::after  { content: ' ▲'; color: var(--cyan); }
    th.sorted-desc::after { content: ' ▼'; color: var(--cyan); }
    td {
        padding: 0.6rem 1rem; border-bottom: 1px solid var(--gray100);
        color: var(--gray700); white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8faff; }
    .td-city    { font-weight: 600; color: var(--navy); }
    .td-state   { color: var(--gray500); font-size: 0.78rem; }
    .td-station {
        max-width: 220px; overflow: hidden; text-overflow: ellipsis;
        color: var(--gray500); font-size: 0.76rem;
    }

    .pol-badge {
        display: inline-block; padding: 0.15rem 0.5rem;
        border-radius: 4px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.03em;
    }
    .pol-PM25  { background: #fee2e2; color: #991b1b; }
    .pol-PM10  { background: #fef3c7; color: #92400e; }
    .pol-NO2   { background: #dbeafe; color: #1d4ed8; }
    .pol-SO2   { background: #f3e8ff; color: #7e22ce; }
    .pol-CO    { background: #d1fae5; color: #065f46; }
    .pol-OZONE { background: #e0f2fe; color: #075985; }
    .pol-NH3   { background: #fce7f3; color: #9d174d; }

    .val-safe   { color: #059669; font-weight: 600; }
    .val-warn   { color: #d97706; font-weight: 600; }
    .val-danger { color: #dc2626; font-weight: 600; }
    .val-na     { color: var(--gray300); }

    .skeleton {
        background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
        background-size: 200% 100%;
        animation: shimmer 1.2s infinite;
        border-radius: 3px; height: 14px; display: inline-block;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .pagination {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0.85rem 1rem; border-top: 1px solid var(--gray100);
        background: var(--gray50); flex-wrap: wrap; gap: 0.5rem;
    }
    .page-info { font-size: 0.78rem; color: var(--gray500); }
    .page-btns { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .page-btn {
        padding: 0.3rem 0.65rem; border: 1px solid var(--gray200);
        border-radius: 4px; background: white; font-size: 0.78rem;
        cursor: pointer; transition: all 0.15s; color: var(--gray700);
        font-family: 'Source Sans 3', sans-serif;
    }
    .page-btn:hover { border-color: var(--blue2); color: var(--blue); }
    .page-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-row td {
        text-align: center; padding: 2.5rem;
        color: var(--gray500); font-size: 0.85rem;
    }
</style>

<!-- Rest of HTML + JS remains exactly same as your uploaded file -->

{% endblock %}
